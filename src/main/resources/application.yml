spring:
  application:
    name: urlShortner

server:
  port: 8080

app:
  base-url: http://localhost:8080
  short-code-length: 7
  max-generation-attempts: 16
  # Default lifetime when ttlSeconds is omitted on create
  default-ttl: 24h
  # Hard upper bound for custom TTL
  max-ttl: 30d
  # Kept for config compatibility (storage is ConcurrentHashMap)
  cache-max-size: 100000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.urlShortner: INFO
